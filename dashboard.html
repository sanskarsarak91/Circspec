<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<svg width="1200" height="700"></svg>

<script>

const svg = d3.select("svg");

fetch("/api/dynamic-properties/")
.then(res=>res.json())
.then(data=>{

    data.forEach(item=>{

        svg.append("circle")
            .attr("cx", item.x_position)
            .attr("cy", item.y_position)
            .attr("r", 20)
            .style("fill","blue");

    });

});

</script>

</body>
</html>
